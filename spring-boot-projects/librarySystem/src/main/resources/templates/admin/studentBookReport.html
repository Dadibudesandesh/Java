<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Student Borrowed Books Report</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="card shadow-lg p-4">
    <h2 class="text-center mb-4">Student Borrowed Books Report</h2>

    <!-- Form for Admin to Enter Student ID -->
    <form action="/admin/studentBookReport_view" method="get" class="mb-4 text-center">
      <label for="studentId" class="form-label">Enter Student ID:</label>
      <input type="number" id="studentId" name="studentId" class="form-control w-50 mx-auto"
             placeholder="Enter Student ID" required>
      <button type="submit" class="btn btn-primary mt-3">View Report</button>
    </form>

    <!-- Report Table -->
    <div th:if="${borrowedBooks != null}">
      <h4 class="text-center text-primary">Student ID: <span th:text="${studentId}"></span></h4>

      <table class="table table-bordered mt-3">
        <thead class="table-dark">
        <tr>
          <th>Book Title</th>
          <th>Author</th>
          <th>Issue Date</th>
          <th>Due Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="borrow : ${borrowedBooks}">
          <td th:text="${borrow.book.name}"></td>
          <td th:text="${borrow.book.author}"></td>
          <td th:text="${borrow.borrowDate}"></td>
          <td th:text="${borrow.dueDate}"></td>
        </tr>
        </tbody>
      </table>

      <div th:if="${borrowedBooks.size() == 0}" class="alert alert-warning text-center">
        No borrowed books found for this student.
      </div>
    </div>
  </div>
</div>
</body>
</html>
